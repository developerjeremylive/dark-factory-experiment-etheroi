name: dark-factory-validate-pr
description: |
  Use when: Dark Factory orchestrator wants to validate a PR labeled `factory:needs-review`
            against its linked issue, run static + unit + E2E (agent-browser) checks under
            the holdout pattern, optionally self-fix issues in a fresh-context session,
            re-validate, and render a final verdict.
  Triggers: Orchestrator dispatch for `factory:needs-review`, or manual "validate PR #N".
  Does: Fetches PR + linked issue + base-branch governance -> starts the app on dynamic
        ports -> runs static checks + unit tests + four parallel HOLDOUT reviewers
        (behavioral, agent-browser E2E, security, code review) -> synthesizes a verdict.
        If request_changes, runs a fresh-context fix pass, then a second full validation
        pass (all reviewers re-run on the updated diff). Always tears down the app,
        then applies the final verdict (approve / request_changes / reject).
  NOT for: Triage (dark-factory-triage), initial implementation (dark-factory-fix-github-issue),
           weekly full-suite E2E (dark-factory-comprehensive-test).

  Combines what used to be two workflows (validate-pr + fix-pr) into one state machine,
  so fix and re-validate happen in the same orchestrator dispatch with different
  fresh-context sessions. This is the user-requested "validate it AND fix it in one
  workflow" shape.

  ═══════════════════════════════════════════════════════════════════════════
  HOLDOUT PRINCIPLE — the core design constraint
  ═══════════════════════════════════════════════════════════════════════════

  The validator must NEVER see implementation artifacts or coder rationale. It
  tests the OUTCOME (diff + running app + tests) against the CONTRACT (issue body
  + base-branch governance). This is the StrongDM holdout pattern — the single
  most important defense against AI coding agents gaming their own quality
  signal.

  How the holdout is enforced in this workflow (six overlapping layers):

  1. Cross-workflow isolation — runs as a separate Archon workflow with its own
     $ARTIFACTS_DIR and worktree. Never references sibling-workflow state.

  2. Holdout-safe fetches — gh pr view excludes `comments`/`reviews`; gh issue
     view fetches only title/body/labels. No coder chatter reaches the reviewers.

  3. Poison immunity — FACTORY_RULES.md, MISSION.md, CLAUDE.md are fetched from
     `origin/main` BEFORE `gh pr checkout`. A PR cannot weaken its own rulebook.
     Any diff touching governance files is an automatic REJECT.

  4. Fresh context + empty tool lists on every AI reviewer node. The behavioral
     static reviewer has `allowed_tools: []`. The E2E reviewer has `[Bash]` (only
     to drive agent-browser) and is explicitly forbidden from reading source.

  5. Command-file explicit prohibitions — every AI node loads a .md command file
     whose leading section enumerates what must not be read (plans, commit
     messages, coder rationale, prior comments, sibling-workflow files).

  6. Fix/validate session isolation — the fix phase (Phase 6) runs in a fresh
     context. When Phase 7's validators re-run, they ALSO run in fresh contexts.
     The fixer's reasoning never leaks into the second validation pass — pass-2
     reviewers see only the updated diff and the running app.

  Prerequisite: `agent-browser` must be installed and available on PATH. On the
  dark-factory VPS this is installed globally. Locally, `npm i -g agent-browser`
  then `agent-browser install` to fetch Chrome for Testing. See the
  `.claude/skills/agent-browser/SKILL.md` skill for CLI reference.

provider: claude
model: sonnet

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: EXTRACT + HOLDOUT-SAFE CONTEXT FETCH
  # ═══════════════════════════════════════════════════════════════

  - id: extract-pr-number
    command: dark-factory-extract-pr-number
    model: haiku
    allowed_tools: [Bash]

  - id: fetch-pr
    bash: |
      set -euo pipefail
      PR_NUMBER=$(echo "$extract-pr-number.output" | tr -d "'\"\`\n " | grep -oE '[0-9]+' | head -1)
      if [ -z "$PR_NUMBER" ]; then
        echo "ERROR: Failed to extract PR number from: $extract-pr-number.output" >&2
        exit 1
      fi
      echo "$PR_NUMBER" > "$ARTIFACTS_DIR/.pr-number"
      # HOLDOUT: fetch only fields the validator needs.
      # NO comments, NO reviews, NO commit messages.
      gh pr view "$PR_NUMBER" --json number,title,body,url,headRefName,baseRefName,additions,deletions,changedFiles,state,author,labels
    depends_on: [extract-pr-number]
    timeout: 20000

  - id: fetch-diff
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")
      # Cap at 3000 lines — FACTORY_RULES.md §3 already caps PRs at 500 lines
      # changed; the 3000-line cap here is a defense against accidental huge diffs.
      gh pr diff "$PR_NUMBER" | head -3000
    depends_on: [fetch-pr]
    timeout: 20000

  - id: fetch-linked-issue
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")
      ISSUE_NUM=$(gh pr view "$PR_NUMBER" --json body -q '.body' \
        | grep -oiE '(fixes|closes|resolves) #[0-9]+' \
        | grep -oE '[0-9]+' | head -1)
      if [ -n "$ISSUE_NUM" ]; then
        # HOLDOUT: title + body + labels only. NO comments.
        gh issue view "$ISSUE_NUM" --json number,title,body,labels,state,url
      else
        echo '{"error": "No linked issue found in PR body. Factory PRs must link via Fixes/Closes/Resolves per FACTORY_RULES.md."}'
      fi
    depends_on: [fetch-pr]
    timeout: 20000

  - id: fetch-base-governance
    bash: |
      set -euo pipefail
      # POISON IMMUNITY: read governance files from origin/main, NOT from the PR.
      git fetch origin main --quiet 2>/dev/null || true
      BASE_REF="origin/main"
      echo "=== FACTORY_RULES.md (from $BASE_REF) ==="
      git show "$BASE_REF:FACTORY_RULES.md" 2>/dev/null || echo "(FACTORY_RULES.md not present on base branch)"
      echo ""
      echo "=== MISSION.md (from $BASE_REF) ==="
      git show "$BASE_REF:MISSION.md" 2>/dev/null || echo "(MISSION.md not present on base branch)"
      echo ""
      echo "=== CLAUDE.md (from $BASE_REF) ==="
      git show "$BASE_REF:CLAUDE.md" 2>/dev/null || echo "(CLAUDE.md not present on base branch)"
    timeout: 15000

  # Tripwire: fail loudly if fix-workflow artifacts ever leak into $ARTIFACTS_DIR.
  # Should be impossible under normal Archon isolation.
  - id: verify-holdout-clean
    bash: |
      set -euo pipefail
      FORBIDDEN_ARTIFACTS=(plan.md investigation.md implementation.md validation.md fix-notes.md)
      LEAKED=()
      for f in "${FORBIDDEN_ARTIFACTS[@]}"; do
        if [ -e "$ARTIFACTS_DIR/$f" ]; then LEAKED+=("$f"); fi
      done
      if [ ${#LEAKED[@]} -gt 0 ]; then
        echo "HOLDOUT VIOLATION: \$ARTIFACTS_DIR contains leaked fix-workflow artifacts: ${LEAKED[*]}" >&2
        echo "This should be impossible under normal Archon isolation. Aborting validation." >&2
        exit 1
      fi
      echo "HOLDOUT_CLEAN: no fix-workflow artifacts in \$ARTIFACTS_DIR"
    timeout: 5000

  - id: checkout-pr
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")
      # Defensive: drop any stray untracked files in infra directories before
      # switching branches. If the VPS-side main has untracked files in
      # .archon/ or .claude/ (e.g., experimental workflows that haven't been
      # committed), Archon's worktree creation can carry them in and gh pr
      # checkout will refuse to overwrite them when the PR adds the same
      # paths as tracked files. Cleaning here makes checkout deterministic.
      git clean -fd .archon/ .claude/ 2>/dev/null || true

      # Stale worktree prune. Archon doesn't always clean up worktrees after
      # a run completes — even successful runs. If the preceding
      # fix-github-issue workflow left its worktree pointing at this PR's
      # branch, `gh pr checkout` will fail with
      #   fatal: branch 'X' is already used by worktree at '...'
      # So we proactively discover any other worktree holding this PR's
      # branch and force-remove it. Idempotent: no-op on a clean repo.
      #
      # Self-skip: if the CURRENT worktree happens to hold the PR branch
      # already (e.g., a prior dispatch on the same `--branch` name reused
      # this worktree directory), we must NOT try to remove ourselves —
      # that corrupts our own .git pointer mid-run.
      #
      # We compare against `git rev-parse --show-toplevel` rather than
      # `$(pwd)` because on Windows Git Bash, `$(pwd)` can return a path
      # with different casing / separator normalization than what
      # `git worktree list --porcelain` emits, causing the self-skip
      # guard to fail silently. `git rev-parse --show-toplevel` emits
      # the git-canonical path in the same format the porcelain listing
      # uses, so string equality is reliable.
      PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q '.headRefName')
      if [ -n "$PR_BRANCH" ]; then
        echo "Checking for stale worktrees holding branch '$PR_BRANCH'..."
        git worktree prune
        CURRENT_WT=$(git rev-parse --show-toplevel 2>/dev/null || echo "")
        echo "Current worktree (canonical): $CURRENT_WT"
        git worktree list --porcelain | awk -v b="$PR_BRANCH" '
          /^worktree / {w=$2}
          $0 == "branch refs/heads/" b {print w}
        ' | while read -r stale_wt; do
          if [ -z "$stale_wt" ]; then
            continue
          fi
          if [ "$stale_wt" = "$CURRENT_WT" ]; then
            echo "Skipping self (current worktree holds PR branch): $stale_wt"
            continue
          fi
          echo "Removing stale worktree: $stale_wt"
          git worktree remove --force "$stale_wt" 2>&1 || true
        done
        git worktree prune
      fi

      gh pr checkout "$PR_NUMBER"
      echo "Checked out PR #$PR_NUMBER on branch $(git branch --show-current)"
      # Pull infra-only files from origin/main into the worktree so the
      # validator always uses the latest workflow command files and skills,
      # regardless of how stale the PR branch is. We deliberately do NOT
      # merge main's app code — the validator must see the PR's diff
      # exactly as the author wrote it. Governance was captured into the
      # fetch-base-governance artifact BEFORE this checkout, so the
      # holdout property is preserved either way.
      git fetch origin main --quiet
      # Discard any local changes in infra dirs before overlaying main's
      # versions. Without this, `git checkout origin/main -- .archon/`
      # fails when the worktree was created from a stale commit and the
      # infra files have been modified since (e.g., we just pushed a
      # workflow fix to main).
      git checkout -- .archon/ .claude/ 2>/dev/null || true
      git checkout origin/main -- .archon/ .claude/ 2>/dev/null || true
      # Reset any infra path that doesn't exist on main rather than failing.
      echo "Synced .archon/ and .claude/ from origin/main:"
      git status --short .archon/ .claude/ | head -20 || true
    depends_on: [fetch-pr, verify-holdout-clean, fetch-base-governance]
    timeout: 60000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: INSTALL DEPS + START THE APP FOR E2E
  # ═══════════════════════════════════════════════════════════════
  # We need the app running before the E2E reviewer can drive it.
  # Dynamic port allocation so parallel workflow runs don't collide.

  - id: allocate-ports
    bash: |
      set -euo pipefail
      # Backend MUST use port 8000. The Vite dev server proxy in
      # vite.config.ts is hardcoded to forward /api/* to localhost:8000.
      # The frontend code (api.ts) uses relative `/api/...` paths that
      # go through this proxy. Using a dynamic backend port breaks all
      # browser-based validation because the proxy target doesn't match.
      BACKEND_PORT=8000
      if (echo >/dev/tcp/127.0.0.1/$BACKEND_PORT) 2>/dev/null; then
        echo "ERROR: port $BACKEND_PORT already in use - cannot start backend" >&2
        exit 1
      fi

      # Frontend port can be dynamic - agent-browser reads it from the
      # artifact file and connects directly.
      find_free_port() {
        local start=$1 end=$2
        for port in $(seq $start $end); do
          if ! (echo >/dev/tcp/127.0.0.1/$port) 2>/dev/null; then
            echo $port; return 0
          fi
        done
        echo "ERROR: no free port in range $start-$end" >&2; return 1
      }
      FRONTEND_PORT=$(find_free_port 15100 15999)

      echo "$BACKEND_PORT"  > "$ARTIFACTS_DIR/.backend-port"
      echo "$FRONTEND_PORT" > "$ARTIFACTS_DIR/.frontend-port"
      echo "Allocated backend=$BACKEND_PORT frontend=$FRONTEND_PORT"
    depends_on: [checkout-pr]
    timeout: 10000

  - id: install-deps
    bash: |
      set -euo pipefail
      export PATH="$HOME/.local/bin:$PATH"
      echo "=== Backend deps (uv sync) ==="
      (cd app/backend && uv sync --all-extras 2>&1 | tail -10)
      echo ""
      echo "=== Frontend deps (bun install) ==="
      (cd app/frontend && bun install 2>&1 | tail -10)
      echo ""
      # Warm the mypy cache. Cold mypy on this backend exceeds the 2-min
      # bash-node default timeout and SIGTERMs static-checks-backend-p1;
      # a warm .mypy_cache/ lets the next mypy run complete in seconds.
      # All DAG nodes in a run share this worktree, so the cache we populate
      # here is the cache static-checks-backend-p1 (and -p2) will hit.
      # Type errors are non-fatal here — the cache populates regardless,
      # and the real verdict comes from the dedicated static-checks nodes.
      echo "=== Warming mypy cache ==="
      (cd app/backend && uv run mypy . 2>&1 | tail -3) || true
    depends_on: [checkout-pr]
    # Bash nodes ignore idle_timeout — only `timeout` is honored (default
    # 120000ms). Must set explicitly: uv sync + bun install + cold mypy
    # together can run 3-5 minutes on a fresh worktree.
    timeout: 600000

  - id: start-app
    bash: |
      set -euo pipefail
      export PATH="$HOME/.local/bin:$PATH"

      # Load the validation-sandbox env file. The backend now hard-requires
      # DATABASE_URL (Postgres) and other secrets at import time; without this
      # sourcing step, uvicorn crashes before the health check ever responds
      # and the E2E reviewer never gets a running app to drive. That used to
      # silently degrade to `e2e_status: "not_e2e_testable"` and slip past the
      # synthesizer — apply-verdict now has a deterministic backstop, but the
      # real fix is making start-app actually work.
      #
      # The env file lives OUTSIDE the repo (it contains secrets and must not
      # be committed). Path is overridable via DARK_FACTORY_VALIDATION_ENV;
      # defaults to /opt/dark-factory/validation.env on the VPS. Any VPS where
      # this workflow runs must have that file populated with at minimum:
      #   DATABASE_URL, OPENROUTER_API_KEY, JWT_SECRET, SUPADATA_API_KEY,
      #   YOUTUBE_CHANNEL_ID
      # Use a DEDICATED validation database URL — not production — so E2E runs
      # can't pollute real user data.
      VALIDATION_ENV="${DARK_FACTORY_VALIDATION_ENV:-/opt/dark-factory/validation.env}"
      if [ -f "$VALIDATION_ENV" ]; then
        echo "Loading validation env from $VALIDATION_ENV"
        set -a
        # shellcheck disable=SC1090
        . "$VALIDATION_ENV"
        set +a
      else
        echo "WARN: validation env file not found at $VALIDATION_ENV" >&2
        echo "WARN: backend will likely fail to boot without DATABASE_URL and friends" >&2
      fi

      # Fail fast with a clear message if required vars are missing. Better
      # to die here with a diagnosable error than to watch uvicorn crash at
      # import and confuse the E2E reviewer into `not_e2e_testable`.
      REQUIRED_VARS=(DATABASE_URL OPENROUTER_API_KEY JWT_SECRET SUPADATA_API_KEY YOUTUBE_CHANNEL_ID)
      MISSING=()
      for v in "${REQUIRED_VARS[@]}"; do
        if [ -z "${!v:-}" ]; then MISSING+=("$v"); fi
      done
      if [ ${#MISSING[@]} -gt 0 ]; then
        echo "ERROR: required env vars missing for validation sandbox: ${MISSING[*]}" >&2
        echo "ERROR: populate $VALIDATION_ENV (outside the repo) and retry." >&2
        exit 1
      fi

      # Normal path: ports come from the find-free-ports node via artifacts.
      # Demo/manual path: if the port files are missing (e.g. someone ran this
      # node in isolation), fall back to sensible defaults and write them so
      # downstream nodes that read the files still work.
      if [ -f "$ARTIFACTS_DIR/.backend-port" ]; then
        BACKEND_PORT=$(cat "$ARTIFACTS_DIR/.backend-port")
      else
        BACKEND_PORT=8000
        echo "$BACKEND_PORT" > "$ARTIFACTS_DIR/.backend-port"
        echo "WARN: .backend-port missing, defaulting to $BACKEND_PORT" >&2
      fi
      if [ -f "$ARTIFACTS_DIR/.frontend-port" ]; then
        FRONTEND_PORT=$(cat "$ARTIFACTS_DIR/.frontend-port")
      else
        FRONTEND_PORT=15100
        echo "$FRONTEND_PORT" > "$ARTIFACTS_DIR/.frontend-port"
        echo "WARN: .frontend-port missing, defaulting to $FRONTEND_PORT" >&2
      fi

      mkdir -p "$ARTIFACTS_DIR/app-logs"

      # Backend: uvicorn on dynamic port, logs to artifacts
      (
        cd app
        nohup uv --project backend run uvicorn backend.main:app \
          --host 127.0.0.1 --port "$BACKEND_PORT" \
          > "$ARTIFACTS_DIR/app-logs/backend.log" 2>&1 &
        echo $! > "$ARTIFACTS_DIR/.backend-pid"
      )

      # Frontend: vite dev server on dynamic port.
      # We use --port and --strictPort to force the assigned port.
      # API_BASE env var is set so the frontend calls the right backend
      # (bypassing the known-broken vite proxy — see CLAUDE.md footguns).
      (
        cd app/frontend
        VITE_API_BASE="http://127.0.0.1:$BACKEND_PORT" \
        nohup bun run dev -- --host 127.0.0.1 --port "$FRONTEND_PORT" --strictPort \
          > "$ARTIFACTS_DIR/app-logs/frontend.log" 2>&1 &
        echo $! > "$ARTIFACTS_DIR/.frontend-pid"
      )

      # Wait for both to be healthy
      echo "Waiting for backend on :$BACKEND_PORT ..."
      for i in $(seq 1 60); do
        if curl -sf "http://127.0.0.1:$BACKEND_PORT/api/health" > /dev/null 2>&1; then
          echo "backend up after ${i}s"; break
        fi
        if [ $i -eq 60 ]; then
          echo "ERROR: backend failed to start in 60s" >&2
          tail -50 "$ARTIFACTS_DIR/app-logs/backend.log" >&2
          exit 1
        fi
        sleep 1
      done

      echo "Waiting for frontend on :$FRONTEND_PORT ..."
      for i in $(seq 1 60); do
        if curl -sf "http://127.0.0.1:$FRONTEND_PORT" > /dev/null 2>&1; then
          echo "frontend up after ${i}s"; break
        fi
        if [ $i -eq 60 ]; then
          echo "ERROR: frontend failed to start in 60s" >&2
          tail -50 "$ARTIFACTS_DIR/app-logs/frontend.log" >&2
          exit 1
        fi
        sleep 1
      done

      echo "APP_STARTED backend=$BACKEND_PORT frontend=$FRONTEND_PORT"
    depends_on: [install-deps, allocate-ports]
    idle_timeout: 180000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: PASS-1 STATIC CHECKS + UNIT TESTS (deterministic, parallel)
  # ═══════════════════════════════════════════════════════════════

  - id: static-checks-backend-p1
    bash: |
      set +e
      export PATH="$HOME/.local/bin:$PATH"
      cd app/backend
      # ${PIPESTATUS[0]} captures the real command's exit, not `tail`'s.
      # Plain $? after a pipe reads tail's exit (always 0), silently
      # masking ruff/mypy failures.
      echo "=== ruff check ==="
      uv run ruff check . 2>&1 | tail -30
      RUFF_LINT=${PIPESTATUS[0]}
      echo ""
      echo "=== ruff format --check ==="
      uv run ruff format --check . 2>&1 | tail -30
      RUFF_FMT=${PIPESTATUS[0]}
      echo ""
      echo "=== mypy ==="
      uv run mypy . 2>&1 | tail -30
      MYPY=${PIPESTATUS[0]}
      echo ""
      echo "RESULT: ruff-lint=$([ $RUFF_LINT -eq 0 ] && echo PASS || echo FAIL) ruff-fmt=$([ $RUFF_FMT -eq 0 ] && echo PASS || echo FAIL) mypy=$([ $MYPY -eq 0 ] && echo PASS || echo FAIL)"
      [ $RUFF_LINT -eq 0 ] && [ $RUFF_FMT -eq 0 ] && [ $MYPY -eq 0 ]
    depends_on: [install-deps]
    # Bash nodes honor `timeout`, not `idle_timeout`. Even with a warm
    # .mypy_cache from install-deps, ruff + mypy on a fresh worktree
    # occasionally runs >2 minutes — give it real headroom.
    timeout: 300000

  - id: static-checks-frontend-p1
    bash: |
      set +e
      cd app/frontend
      echo "=== tsc --noEmit ==="
      bun run tsc --noEmit 2>&1 | tail -40
      TSC=$?
      echo ""
      echo "=== biome check ==="
      bun x biome check src 2>&1 | tail -30
      BIOME=$?
      echo ""
      echo "RESULT: tsc=$([ $TSC -eq 0 ] && echo PASS || echo FAIL) biome=$([ $BIOME -eq 0 ] && echo PASS || echo FAIL)"
      [ $TSC -eq 0 ] && [ $BIOME -eq 0 ]
    depends_on: [install-deps]
    idle_timeout: 180000

  - id: run-tests-backend-p1
    bash: |
      set +e
      export PATH="$HOME/.local/bin:$PATH"
      cd app/backend
      if [ ! -d "tests" ]; then
        echo "TEST_RESULT_BACKEND=SKIPPED (no backend/tests directory)"
        exit 0
      fi
      uv run pytest tests -xvs 2>&1 | tail -80
      echo ""
      echo "TEST_RESULT_BACKEND=$([ $? -eq 0 ] && echo PASS || echo FAIL)"
    depends_on: [install-deps]
    idle_timeout: 300000

  - id: run-tests-frontend-p1
    bash: |
      set +e
      cd app/frontend
      if ! grep -q '"test"' package.json 2>/dev/null; then
        echo "TEST_RESULT_FRONTEND=SKIPPED (no test script in package.json)"
        exit 0
      fi
      bun run test 2>&1 | tail -60
      echo ""
      echo "TEST_RESULT_FRONTEND=$([ $? -eq 0 ] && echo PASS || echo FAIL)"
    depends_on: [install-deps]
    idle_timeout: 300000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: PASS-1 HOLDOUT REVIEWERS (parallel, fresh context)
  # ═══════════════════════════════════════════════════════════════

  # Static behavioral: reads issue + PR metadata + diff. No filesystem, no tools.
  - id: behavioral-validation-p1
    command: dark-factory-behavioral-validation
    depends_on: [fetch-pr, fetch-diff, fetch-linked-issue]
    context: fresh
    allowed_tools: []
    output_format:
      type: object
      properties:
        solves_issue: { type: string, enum: ["yes", "partially", "no"] }
        asks_identified: { type: array, items: { type: string } }
        asks_addressed:  { type: array, items: { type: string } }
        asks_missed:     { type: array, items: { type: string } }
        regressions_detected: { type: array, items: { type: string } }
        scope_appropriate: { type: string, enum: ["yes", "too_narrow", "too_broad"] }
        unrequested_changes: { type: array, items: { type: string } }
        confidence: { type: string, enum: ["high", "medium", "low"] }
        reasoning: { type: string }
      required:
        - solves_issue
        - asks_identified
        - asks_addressed
        - asks_missed
        - regressions_detected
        - scope_appropriate
        - unrequested_changes
        - confidence
        - reasoning

  # E2E behavioral: drives the running app via agent-browser.
  # This is the "real-world holdout" — observable behavior, not source inspection.
  - id: behavioral-e2e-p1
    command: dark-factory-behavioral-e2e
    depends_on: [fetch-pr, fetch-linked-issue, start-app]
    context: fresh
    allowed_tools: [Bash]
    skills: [agent-browser]
    output_format:
      type: object
      properties:
        solves_issue: { type: string, enum: ["yes", "partially", "no", "not_e2e_testable"] }
        app_booted: { type: boolean }
        flows_tested: { type: array, items: { type: string } }
        criteria_results:
          type: array
          items:
            type: object
            properties:
              criterion: { type: string }
              result: { type: string, enum: ["pass", "fail", "skip"] }
              evidence: { type: string }
            required: [criterion, result, evidence]
        regressions_observed: { type: array, items: { type: string } }
        evidence_captured: { type: array, items: { type: string } }
        confidence: { type: string, enum: ["high", "medium", "low"] }
        reasoning: { type: string }
      required:
        - solves_issue
        - app_booted
        - flows_tested
        - criteria_results
        - regressions_observed
        - evidence_captured
        - confidence
        - reasoning

  - id: security-check-p1
    command: dark-factory-security-check
    depends_on: [fetch-diff, fetch-base-governance]
    context: fresh
    allowed_tools: []
    output_format:
      type: object
      properties:
        security_issues:
          type: array
          items:
            type: object
            properties:
              severity: { type: string, enum: ["critical", "high", "medium", "low"] }
              category: { type: string, enum: ["secret", "injection", "dependency", "permission", "governance", "data_exposure"] }
              description: { type: string }
              file: { type: string }
              line: { type: string }
            required: [severity, category, description, file]
        governance_files_modified: { type: boolean }
        protected_files_touched: { type: array, items: { type: string } }
        new_dependencies: { type: array, items: { type: string } }
        new_dependencies_justified: { type: boolean }
        verdict: { type: string, enum: ["pass", "fail"] }
        reasoning: { type: string }
      required:
        - security_issues
        - governance_files_modified
        - protected_files_touched
        - new_dependencies
        - new_dependencies_justified
        - verdict
        - reasoning

  - id: code-review-p1
    command: archon-code-review-agent
    depends_on: [checkout-pr]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: SYNTHESIZE PASS-1 VERDICT
  # ═══════════════════════════════════════════════════════════════

  - id: synthesize-verdict-pass-1
    command: dark-factory-synthesize-verdict
    depends_on:
      # Infrastructure prerequisites — must be present so the synthesizer
      # can detect whether the app actually ran. The synthesizer command
      # (dark-factory-synthesize-verdict.md) checks $checkout-pr.output and
      # $start-app.output and fails closed to reject+escalate if either is
      # empty or missing its success marker. This prevents the validator
      # from rendering an "approve" verdict when checkout-pr crashed and
      # static checks / tests / E2E never ran at all.
      - checkout-pr
      - start-app
      - static-checks-backend-p1
      - static-checks-frontend-p1
      - run-tests-backend-p1
      - run-tests-frontend-p1
      - behavioral-validation-p1
      - behavioral-e2e-p1
      - security-check-p1
      - code-review-p1
      - fetch-base-governance
    trigger_rule: all_done
    context: fresh
    allowed_tools: []
    output_format:
      type: object
      properties:
        verdict: { type: string, enum: ["approve", "request_changes", "reject"] }
        summary: { type: string }
        static_checks_status: { type: string, enum: ["pass", "fail"] }
        tests_status: { type: string, enum: ["pass", "fail", "skipped"] }
        behavioral_status: { type: string, enum: ["yes", "partially", "no"] }
        e2e_status: { type: string, enum: ["yes", "partially", "no", "not_e2e_testable"] }
        security_status: { type: string, enum: ["pass", "fail"] }
        issues_to_fix:
          type: array
          items:
            type: object
            properties:
              category: { type: string, enum: ["behavioral", "test_failure", "static_check", "code_quality", "security", "scope", "e2e"] }
              severity: { type: string, enum: ["critical", "high", "medium", "low"] }
              description: { type: string }
              file: { type: string }
            required: [category, severity, description]
        should_escalate: { type: boolean }
        escalation_reason: { type: string }
        reasoning: { type: string }
      required:
        - verdict
        - summary
        - static_checks_status
        - tests_status
        - behavioral_status
        - e2e_status
        - security_status
        - issues_to_fix
        - should_escalate
        - reasoning

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: FIX (conditional — runs only when pass-1 says request_changes)
  # ═══════════════════════════════════════════════════════════════
  # Fresh context. The fixer sees synthesize-verdict-pass-1's issues_to_fix
  # and nothing else from prior phases. It reads current source (it has to),
  # applies minimal targeted fixes, runs local validation, commits, and pushes.
  #
  # The fixer's reasoning does NOT leak into Phase 7 reviewers because those
  # nodes also run with context: fresh — they see only the updated diff and
  # the running app, not the fixer's output beyond its commit message.

  - id: fix-issues
    command: dark-factory-fix-pr-issues
    depends_on: [synthesize-verdict-pass-1]
    when: "$synthesize-verdict-pass-1.output.verdict == 'request_changes'"
    context: fresh
    # The fixer needs full tool access — it's the implementer for this phase.

  # ═══════════════════════════════════════════════════════════════
  # PHASE 7: PASS-2 VALIDATION (conditional — runs only if fix-issues ran)
  # ═══════════════════════════════════════════════════════════════
  # Re-runs ALL reviewers on the updated diff. Each one with fresh context —
  # they don't know a fix happened, they only see the code as it now stands
  # and the app as it now runs (uvicorn --reload and vite HMR picked up the
  # fixer's changes without us having to restart the app).

  - id: fetch-diff-p2
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")
      # Pull the latest — the fixer just pushed.
      git fetch origin "refs/pull/$PR_NUMBER/head" --quiet 2>/dev/null || true
      git pull --ff-only 2>/dev/null || true
      gh pr diff "$PR_NUMBER" | head -3000
    depends_on: [fix-issues]
    timeout: 30000

  - id: static-checks-backend-p2
    bash: |
      set +e
      export PATH="$HOME/.local/bin:$PATH"
      cd app/backend
      # ${PIPESTATUS[0]} captures the real command's exit, not `tail`'s.
      # Plain $? after a pipe reads tail's exit (always 0), silently
      # masking ruff/mypy failures.
      echo "=== ruff check ==="
      uv run ruff check . 2>&1 | tail -30; RUFF_LINT=${PIPESTATUS[0]}
      echo ""
      echo "=== ruff format --check ==="
      uv run ruff format --check . 2>&1 | tail -30; RUFF_FMT=${PIPESTATUS[0]}
      echo ""
      echo "=== mypy ==="
      uv run mypy . 2>&1 | tail -30; MYPY=${PIPESTATUS[0]}
      echo ""
      echo "RESULT: ruff-lint=$([ $RUFF_LINT -eq 0 ] && echo PASS || echo FAIL) ruff-fmt=$([ $RUFF_FMT -eq 0 ] && echo PASS || echo FAIL) mypy=$([ $MYPY -eq 0 ] && echo PASS || echo FAIL)"
      [ $RUFF_LINT -eq 0 ] && [ $RUFF_FMT -eq 0 ] && [ $MYPY -eq 0 ]
    depends_on: [fix-issues]
    # Bash nodes honor `timeout`, not `idle_timeout`. The mypy cache from
    # install-deps is already warm; p2 runs after fix-issues pushed code,
    # so most changed modules need re-checking but most of the tree is
    # cached. 5 min is generous headroom.
    timeout: 300000

  - id: static-checks-frontend-p2
    bash: |
      set +e
      cd app/frontend
      echo "=== tsc --noEmit ==="
      bun run tsc --noEmit 2>&1 | tail -40; TSC=$?
      echo ""
      echo "=== biome check ==="
      bun x biome check src 2>&1 | tail -30; BIOME=$?
      echo ""
      echo "RESULT: tsc=$([ $TSC -eq 0 ] && echo PASS || echo FAIL) biome=$([ $BIOME -eq 0 ] && echo PASS || echo FAIL)"
      [ $TSC -eq 0 ] && [ $BIOME -eq 0 ]
    depends_on: [fix-issues]
    idle_timeout: 180000

  - id: run-tests-backend-p2
    bash: |
      set +e
      export PATH="$HOME/.local/bin:$PATH"
      cd app/backend
      if [ ! -d "tests" ]; then
        echo "TEST_RESULT_BACKEND=SKIPPED"; exit 0
      fi
      uv run pytest tests -xvs 2>&1 | tail -80
      echo ""
      echo "TEST_RESULT_BACKEND=$([ $? -eq 0 ] && echo PASS || echo FAIL)"
    depends_on: [fix-issues]
    idle_timeout: 300000

  - id: run-tests-frontend-p2
    bash: |
      set +e
      cd app/frontend
      if ! grep -q '"test"' package.json 2>/dev/null; then
        echo "TEST_RESULT_FRONTEND=SKIPPED"; exit 0
      fi
      bun run test 2>&1 | tail -60
      echo ""
      echo "TEST_RESULT_FRONTEND=$([ $? -eq 0 ] && echo PASS || echo FAIL)"
    depends_on: [fix-issues]
    idle_timeout: 300000

  - id: behavioral-validation-p2
    command: dark-factory-behavioral-validation-p2
    depends_on: [fix-issues, fetch-diff-p2, fetch-pr, fetch-linked-issue]
    context: fresh
    allowed_tools: []
    output_format:
      type: object
      properties:
        solves_issue: { type: string, enum: ["yes", "partially", "no"] }
        asks_identified: { type: array, items: { type: string } }
        asks_addressed:  { type: array, items: { type: string } }
        asks_missed:     { type: array, items: { type: string } }
        regressions_detected: { type: array, items: { type: string } }
        scope_appropriate: { type: string, enum: ["yes", "too_narrow", "too_broad"] }
        unrequested_changes: { type: array, items: { type: string } }
        confidence: { type: string, enum: ["high", "medium", "low"] }
        reasoning: { type: string }
      required:
        - solves_issue
        - asks_identified
        - asks_addressed
        - asks_missed
        - regressions_detected
        - scope_appropriate
        - unrequested_changes
        - confidence
        - reasoning

  - id: behavioral-e2e-p2
    command: dark-factory-behavioral-e2e
    depends_on: [fix-issues, fetch-pr, fetch-linked-issue, start-app]
    context: fresh
    allowed_tools: [Bash]
    skills: [agent-browser]
    output_format:
      type: object
      properties:
        solves_issue: { type: string, enum: ["yes", "partially", "no", "not_e2e_testable"] }
        app_booted: { type: boolean }
        flows_tested: { type: array, items: { type: string } }
        criteria_results:
          type: array
          items:
            type: object
            properties:
              criterion: { type: string }
              result: { type: string, enum: ["pass", "fail", "skip"] }
              evidence: { type: string }
            required: [criterion, result, evidence]
        regressions_observed: { type: array, items: { type: string } }
        evidence_captured: { type: array, items: { type: string } }
        confidence: { type: string, enum: ["high", "medium", "low"] }
        reasoning: { type: string }
      required:
        - solves_issue
        - app_booted
        - flows_tested
        - criteria_results
        - regressions_observed
        - evidence_captured
        - confidence
        - reasoning

  - id: security-check-p2
    command: dark-factory-security-check-p2
    depends_on: [fix-issues, fetch-diff-p2, fetch-base-governance]
    context: fresh
    allowed_tools: []
    output_format:
      type: object
      properties:
        security_issues:
          type: array
          items:
            type: object
            properties:
              severity: { type: string, enum: ["critical", "high", "medium", "low"] }
              category: { type: string, enum: ["secret", "injection", "dependency", "permission", "governance", "data_exposure"] }
              description: { type: string }
              file: { type: string }
              line: { type: string }
            required: [severity, category, description, file]
        governance_files_modified: { type: boolean }
        protected_files_touched: { type: array, items: { type: string } }
        new_dependencies: { type: array, items: { type: string } }
        new_dependencies_justified: { type: boolean }
        verdict: { type: string, enum: ["pass", "fail"] }
        reasoning: { type: string }
      required:
        - security_issues
        - governance_files_modified
        - protected_files_touched
        - new_dependencies
        - new_dependencies_justified
        - verdict
        - reasoning

  - id: code-review-p2
    command: archon-code-review-agent
    depends_on: [fix-issues]
    context: fresh

  - id: synthesize-verdict-pass-2
    command: dark-factory-synthesize-verdict-p2
    # Only run when pass-1 actually triggered a fix loop. If pass-1 verdict was
    # approve or reject, the pass-2 reviewer nodes are correctly skipped — and
    # this synthesizer would otherwise see all-empty inputs and panic-render an
    # escalation. The when condition here mirrors fix-issues so the two stay
    # in sync.
    when: "$synthesize-verdict-pass-1.output.verdict == 'request_changes'"
    depends_on:
      - static-checks-backend-p2
      - static-checks-frontend-p2
      - run-tests-backend-p2
      - run-tests-frontend-p2
      - behavioral-validation-p2
      - behavioral-e2e-p2
      - security-check-p2
      - code-review-p2
      - fetch-base-governance
    trigger_rule: all_done
    context: fresh
    allowed_tools: []
    output_format:
      type: object
      properties:
        verdict: { type: string, enum: ["approve", "request_changes", "reject"] }
        summary: { type: string }
        static_checks_status: { type: string, enum: ["pass", "fail"] }
        tests_status: { type: string, enum: ["pass", "fail", "skipped"] }
        behavioral_status: { type: string, enum: ["yes", "partially", "no"] }
        e2e_status: { type: string, enum: ["yes", "partially", "no", "not_e2e_testable"] }
        security_status: { type: string, enum: ["pass", "fail"] }
        issues_to_fix:
          type: array
          items:
            type: object
            properties:
              category: { type: string, enum: ["behavioral", "test_failure", "static_check", "code_quality", "security", "scope", "e2e"] }
              severity: { type: string, enum: ["critical", "high", "medium", "low"] }
              description: { type: string }
              file: { type: string }
            required: [category, severity, description]
        should_escalate: { type: boolean }
        escalation_reason: { type: string }
        reasoning: { type: string }
      required:
        - verdict
        - summary
        - static_checks_status
        - tests_status
        - behavioral_status
        - e2e_status
        - security_status
        - issues_to_fix
        - should_escalate
        - reasoning

  # ═══════════════════════════════════════════════════════════════
  # PHASE 8: TEARDOWN (always runs)
  # ═══════════════════════════════════════════════════════════════

  - id: teardown-app
    bash: |
      set +e
      if [ -f "$ARTIFACTS_DIR/.backend-pid" ]; then
        BACKEND_PID=$(cat "$ARTIFACTS_DIR/.backend-pid")
        kill "$BACKEND_PID" 2>/dev/null && echo "killed backend PID $BACKEND_PID" || echo "backend already dead"
      fi
      if [ -f "$ARTIFACTS_DIR/.frontend-pid" ]; then
        FRONTEND_PID=$(cat "$ARTIFACTS_DIR/.frontend-pid")
        kill "$FRONTEND_PID" 2>/dev/null && echo "killed frontend PID $FRONTEND_PID" || echo "frontend already dead"
      fi
      # Best-effort close any lingering agent-browser session
      agent-browser close 2>/dev/null || true
      echo "TEARDOWN_COMPLETE"
    depends_on: [synthesize-verdict-pass-1, synthesize-verdict-pass-2]
    trigger_rule: all_done
    timeout: 30000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 9: APPLY FINAL VERDICT (deterministic bash)
  # ═══════════════════════════════════════════════════════════════
  # Reads whichever synthesize node ran last: if pass-2 ran, use its verdict;
  # otherwise use pass-1. All approve/reject/label operations are pure gh calls
  # — no AI decisions here. Keeps the auto-merge audit trail reproducible.

  - id: apply-verdict
    bash: |
      set -euo pipefail
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number")

      # Capture the synthesizer outputs to disk. Archon substitutes
      # $node-id.output before bash runs, wrapping the value in single
      # quotes with '\'' for embedded apostrophes. Heredoc captures the
      # raw value; Python cleans quote-wrapping and '\'' escaping so jq
      # can parse it as valid JSON.
      cat > "$ARTIFACTS_DIR/p1-verdict.json" <<'__P1_VERDICT_EOF__'
      $synthesize-verdict-pass-1.output
      __P1_VERDICT_EOF__
      cat > "$ARTIFACTS_DIR/p2-verdict.json" <<'__P2_VERDICT_EOF__'
      $synthesize-verdict-pass-2.output
      __P2_VERDICT_EOF__
      for vf in "$ARTIFACTS_DIR/p1-verdict.json" "$ARTIFACTS_DIR/p2-verdict.json"; do
        [ -f "$vf" ] && python3 -c "import sys,pathlib;p=pathlib.Path(sys.argv[1]);t=p.read_text().strip();t=t.strip(chr(39));t=t.replace(chr(39)+chr(92)+chr(39)+chr(39),chr(39));p.write_text(t)" "$vf"
      done

      # Pick the authoritative verdict. If pass-2 ran (i.e., fix happened),
      # it's authoritative. Otherwise use pass-1.
      if [ -s "$ARTIFACTS_DIR/p2-verdict.json" ] && jq -e '.verdict' "$ARTIFACTS_DIR/p2-verdict.json" > /dev/null 2>&1; then
        VERDICT_FILE="$ARTIFACTS_DIR/p2-verdict.json"
        PASS_LABEL="pass-2"
      else
        VERDICT_FILE="$ARTIFACTS_DIR/p1-verdict.json"
        PASS_LABEL="pass-1"
      fi

      # Defensive: if the selected verdict file is empty or unparseable,
      # an upstream node (checkout-pr, start-app, synthesize-verdict-*)
      # failed and its output substitution resolved to nothing. The
      # downstream jq / case logic assumes a well-formed object, so without
      # this guard apply-verdict hits secondary parse errors and the broken
      # run leaves the PR in a stuck state. Write a hardcoded fallback
      # verdict that routes to the reject+escalate branch — this leaves
      # the PR OPEN with factory:needs-human so a human can investigate
      # the underlying validator failure.
      if [ ! -s "$VERDICT_FILE" ] || ! jq -e '.verdict' "$VERDICT_FILE" > /dev/null 2>&1; then
        echo "WARN: verdict file ($VERDICT_FILE) is empty or unparseable - emitting fallback reject+escalate" >&2
        # Single-line printf (not heredoc) on purpose. Archon spawns this
        # node via bash -c "$payload" on Windows, and multi-line heredocs
        # with non-tabbed end markers fail to match their delimiter across
        # that serialization boundary (discovered empirically — the P1/P2
        # heredocs above work because their substituted bodies are one line).
        printf '%s\n' '{"verdict":"reject","summary":"Validator infrastructure failed - no synthesizer output available. Manual investigation required.","static_checks_status":"fail","tests_status":"fail","behavioral_status":"no","security_status":"fail","issues_to_fix":[],"should_escalate":true,"escalation_reason":"Upstream node (checkout-pr, start-app, or synthesize-verdict) failed and produced no verdict. Validator cannot render a substantive decision; human must investigate the broken run.","reasoning":"Fallback verdict emitted by apply-verdict because the selected verdict file was empty or unparseable JSON. This indicates an upstream infrastructure failure, not a defect in the PR under review."}' > "$VERDICT_FILE"
      fi

      cp "$VERDICT_FILE" "$ARTIFACTS_DIR/verdict.json"
      VERDICT_JSON=$(cat "$VERDICT_FILE")

      DECISION=$(echo "$VERDICT_JSON" | jq -r '.verdict')
      SUMMARY=$(echo "$VERDICT_JSON" | jq -r '.summary')
      SHOULD_ESCALATE=$(echo "$VERDICT_JSON" | jq -r '.should_escalate')
      ESCALATION_REASON=$(echo "$VERDICT_JSON" | jq -r '.escalation_reason // empty')
      ISSUES=$(echo "$VERDICT_JSON" | jq -r '
        .issues_to_fix
        | map("- **\(.severity)** [\(.category)]\(if .file then " (`\(.file)`)" else "" end): \(.description)")
        | join("\n")')

      # ──────────────────────────────────────────────────────────────────
      # DETERMINISTIC INFRASTRUCTURE BACKSTOP
      # ──────────────────────────────────────────────────────────────────
      # The synthesize-verdict command file has a "rule 0" that says any
      # validation run where start-app never emitted APP_STARTED must render
      # reject+escalate (see dark-factory-synthesize-verdict.md). That rule
      # was empirically ignored at least once — the AI returned
      # e2e_status: "not_e2e_testable" and verdict: "approve" while the
      # backend had crashed at import with `RuntimeError: DATABASE_URL is
      # not set`. An auto-merged PR that was never actually driven through
      # agent-browser is exactly the failure mode FACTORY_RULES §4 exists
      # to prevent, so rule-0 needs a non-AI enforcement layer.
      #
      # This block is that layer: deterministic bash reads start-app's
      # output directly and flips any approve → reject+escalate when the
      # APP_STARTED marker is absent. Keep it simple — one marker, one
      # grep, one override. Anything more elaborate invites new bugs.
      cat > "$ARTIFACTS_DIR/.start-app-output" <<'__START_APP_OUTPUT_EOF__'
      $start-app.output
      __START_APP_OUTPUT_EOF__
      if grep -q "APP_STARTED" "$ARTIFACTS_DIR/.start-app-output"; then
        APP_DID_START="true"
      else
        APP_DID_START="false"
      fi
      echo "INFRA_BACKSTOP: app_did_start=$APP_DID_START decision=$DECISION"

      if [ "$DECISION" = "approve" ] && [ "$APP_DID_START" != "true" ]; then
        echo "INFRA_BACKSTOP_OVERRIDE: start-app did not emit APP_STARTED but synthesizer rendered approve — overriding to reject+escalate." >&2
        DECISION="reject"
        SHOULD_ESCALATE="true"
        ESCALATION_REASON="Deterministic infrastructure backstop fired: start-app output lacked the APP_STARTED marker, so no agent-browser E2E regression could have actually run against a live app. The synthesize-verdict node rendered an approve verdict anyway (rule 0 of dark-factory-synthesize-verdict.md was not honored). A human must investigate both the infrastructure failure (check \$ARTIFACTS_DIR/app-logs/backend.log and the validation.env file) and the synthesizer's failure to catch it."
        SUMMARY="Infrastructure backstop override: start-app never reached APP_STARTED, so the agent-browser E2E regression required by FACTORY_RULES §3.3 and §4 could not have run. Auto-approve blocked."
        ISSUES=$(printf '%s\n' \
          "- **critical** [e2e]: start-app node did not emit APP_STARTED — backend or frontend failed to boot and the mandatory agent-browser regression never ran." \
          "- **critical** [e2e]: synthesize-verdict rendered approve despite the missing APP_STARTED marker — review why rule 0 of the synthesize-verdict command did not fire.")
      fi
      # ──────────────────────────────────────────────────────────────────

      # GitHub forbids reviewing your own PR (addPullRequestReview GraphQL error).
      # When the bot identity authored the PR, fall back to posting a regular
      # comment so the verdict is still visible. Labels and merge actions still
      # run normally — only the formal review API call is swapped.
      PR_AUTHOR=$(gh pr view "$PR_NUMBER" --json author -q '.author.login' 2>/dev/null || echo "")
      BOT_LOGIN=$(gh api user -q '.login' 2>/dev/null || echo "")
      SELF_REVIEW="false"
      if [ -n "$PR_AUTHOR" ] && [ "$PR_AUTHOR" = "$BOT_LOGIN" ]; then
        SELF_REVIEW="true"
        echo "Self-review detected (PR author '$PR_AUTHOR' == bot '$BOT_LOGIN'); will post as comment instead of formal review."
      fi

      # post_review <review-flag> <body>  — review-flag is --approve/--request-changes/--comment.
      # In self-review mode, always falls back to `gh pr comment`.
      post_review() {
        local flag="$1"
        local body="$2"
        if [ "$SELF_REVIEW" = "true" ]; then
          gh pr comment "$PR_NUMBER" --body "$body"
        else
          gh pr review "$PR_NUMBER" "$flag" --body "$body"
        fi
      }

      # Multi-line PR/issue bodies are built via printf so every source line stays
      # inside the YAML block scalar's indent column (column-0 lines would terminate
      # the block early and cause a YAML parse error).

      case "$DECISION" in
        approve)
          BODY=$(printf '%s\n' \
            "**Dark Factory Validation**: APPROVED (${PASS_LABEL})" \
            "" \
            "${SUMMARY}" \
            "" \
            "All quality gates passed:" \
            "- Behavioral (static): solves_issue=yes" \
            "- Behavioral (E2E via agent-browser): solves_issue=yes" \
            "- Security: pass (no governance files modified)" \
            "- Static checks: pass" \
            "- Tests: pass or legitimately skipped" \
            "- Code review: no critical/high findings" \
            "" \
            "Auto-merging via squash.")
          post_review --approve "$BODY"
          # The PR may have been opened as a draft by the implementer workflow.
          # Mark it ready before merging — draft PRs cannot be merged at all.
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --json isDraft -q '.isDraft' 2>/dev/null || echo "false")
          if [ "$IS_DRAFT" = "true" ]; then
            echo "PR #$PR_NUMBER is draft — marking ready for review before merge"
            gh pr ready "$PR_NUMBER"
          fi
          # Plain squash merge (no --auto). The validator IS the gate — by the
          # time we reach this branch, every quality gate has already passed,
          # so we don't need GitHub branch-protection rules to hold the merge
          # until checks finish. Dropping --auto also means we don't need the
          # repo to have branch protection configured at all.
          # Don't pass --delete-branch: gh tries to delete the local branch
          # after merging, which requires switching off it. In a worktree
          # where main is checked out elsewhere, that switch fails and aborts
          # apply-verdict (set -e) before the label swap runs. Repos with
          # "Automatically delete head branches" enabled handle deletion
          # server-side anyway.
          if gh pr merge "$PR_NUMBER" --squash; then
            echo "PR #$PR_NUMBER: merged via squash"
          else
            echo "WARN: squash merge failed for PR #$PR_NUMBER — leaving approved for manual merge" >&2
          fi
          gh pr edit "$PR_NUMBER" --remove-label "factory:needs-review" --add-label "factory:approved" 2>/dev/null || true
          echo "PR #$PR_NUMBER: APPROVED (${PASS_LABEL})"
          ;;

        request_changes)
          # If pass-2 still says request_changes, we've exhausted autonomous fix attempts -> escalate.
          if [ "$PASS_LABEL" = "pass-2" ] || [ "$SHOULD_ESCALATE" = "true" ]; then
            BODY=$(printf '%s\n' \
              "**Dark Factory Validation**: ESCALATED TO HUMAN (${PASS_LABEL})" \
              "" \
              "${SUMMARY}" \
              "" \
              "### Escalation reason" \
              "${ESCALATION_REASON:-Autonomous fix pass did not resolve all blocking issues. Human review required.}" \
              "" \
              "### Issues remaining" \
              "${ISSUES}")
            post_review --request-changes "$BODY"
            gh pr edit "$PR_NUMBER" --remove-label "factory:needs-review" --add-label "factory:needs-human" 2>/dev/null || true
            echo "PR #$PR_NUMBER: ESCALATED to human after ${PASS_LABEL}"
          else
            # pass-1 said request_changes but somehow fix didn't run — shouldn't happen.
            BODY=$(printf '%s\n' \
              "**Dark Factory Validation**: Changes Requested (${PASS_LABEL})" \
              "" \
              "${SUMMARY}" \
              "" \
              "### Issues to fix" \
              "${ISSUES}")
            post_review --request-changes "$BODY"
            gh pr edit "$PR_NUMBER" --remove-label "factory:needs-review" --add-label "factory:needs-fix" 2>/dev/null || true
            echo "PR #$PR_NUMBER: CHANGES REQUESTED (${PASS_LABEL})"
          fi
          ;;

        reject)
          # Two reject sub-cases:
          #   (a) Escalated reject (should_escalate=true): validator itself
          #       flagged something humans must look at. Includes rule-0
          #       infrastructure failures and rule-7 hard-invariant breaches.
          #       PR stays OPEN and gets labeled factory:needs-human. Issue
          #       also gets factory:needs-human. Don't close anything —
          #       a human needs to see the PR diff to investigate.
          #   (b) Normal reject (should_escalate=false): PR is fundamentally
          #       wrong (bad approach, scope creep, security fail). Close the
          #       PR, re-queue the underlying issue for another attempt.
          if [ "$SHOULD_ESCALATE" = "true" ]; then
            BODY=$(printf '%s\n' \
              "**Dark Factory Validation**: REJECTED + ESCALATED (${PASS_LABEL})" \
              "" \
              "${SUMMARY}" \
              "" \
              "### Escalation reason" \
              "${ESCALATION_REASON}" \
              "" \
              "### Findings" \
              "${ISSUES}" \
              "" \
              "This PR is NOT being closed — a human needs to investigate.")
            post_review --request-changes "$BODY"
            gh pr edit "$PR_NUMBER" --remove-label "factory:needs-review" --add-label "factory:needs-human" 2>/dev/null || true

            ISSUE_NUM=$(gh pr view "$PR_NUMBER" --json body -q '.body' \
              | grep -oiE '(fixes|closes|resolves) #[0-9]+' \
              | grep -oE '[0-9]+' | head -1)
            if [ -n "$ISSUE_NUM" ]; then
              gh issue edit "$ISSUE_NUM" --add-label "factory:needs-human" 2>/dev/null || true
              ICOMMENT=$(printf '%s\n' \
                "**Dark Factory**: PR #$PR_NUMBER was rejected and escalated to human review (${PASS_LABEL})." \
                "" \
                "Reason: ${SUMMARY}" \
                "" \
                "${ESCALATION_REASON}")
              gh issue comment "$ISSUE_NUM" --body "$ICOMMENT"
            fi
            echo "PR #$PR_NUMBER: REJECTED+ESCALATED (${PASS_LABEL}) — left open for human review"
          else
            BODY=$(printf '%s\n' \
              "**Dark Factory Validation**: REJECTED (${PASS_LABEL})" \
              "" \
              "${SUMMARY}" \
              "" \
              "### Blocking issues" \
              "${ISSUES}" \
              "" \
              "This PR cannot be fixed incrementally and has been closed.")
            post_review --request-changes "$BODY"
            gh pr close "$PR_NUMBER"

            ISSUE_NUM=$(gh pr view "$PR_NUMBER" --json body -q '.body' \
              | grep -oiE '(fixes|closes|resolves) #[0-9]+' \
              | grep -oE '[0-9]+' | head -1)
            if [ -n "$ISSUE_NUM" ]; then
              gh issue reopen "$ISSUE_NUM" 2>/dev/null || true
              gh issue edit "$ISSUE_NUM" --add-label "factory:accepted" --remove-label "factory:in-progress" 2>/dev/null || true
              ICOMMENT=$(printf '%s\n' \
                "**Dark Factory**: PR #$PR_NUMBER was rejected during validation (${PASS_LABEL}). Issue re-queued for another implementation attempt." \
                "" \
                "Reason: ${SUMMARY}")
              gh issue comment "$ISSUE_NUM" --body "$ICOMMENT"
            fi
            echo "PR #$PR_NUMBER: REJECTED (${PASS_LABEL}) and closed"
          fi
          ;;

        *)
          echo "ERROR: Unknown verdict '$DECISION' from ${PASS_LABEL}" >&2
          exit 1
          ;;
      esac
    depends_on: [teardown-app]
    timeout: 30000
